name: SPM Outdated

on: 
  schedule:
    - cron: '0 0 * * 6' # run every Sunday midnight

permissions:
  contents: read

jobs:
  swiftpm:
    # `macos-13` runners were retired by GitHub Actions; align with the
    # runner used by the other workflows in this repo (Tests.yml, Docs.yml).
    runs-on: macos-26-xlarge
    steps:
    - uses: actions/checkout@v5
    - uses: MeilCli/swiftpm-update-check-action@v3
      id: outdated
